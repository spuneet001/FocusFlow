# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Database (PostgreSQL) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/focusflow
spring.datasource.username=postgres
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=your-256-bit-secret-key-change-this-in-production-please-use-env-var
app.jwt.expiration-ms=86400000

# ── Anthropic Claude API ─────────────────────────────────────────────────────
anthropic.api.key=${ANTHROPIC_API_KEY:sk-ant-asoqjaanidsnqo}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-sonnet-4-20250514
anthropic.api.max-tokens=1500

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,capacitor://localhost,https://localhost,http://localhost

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.focusflow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG